name: mobo_sales
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.5+51

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.20.2
  hugeicons: ^0.0.11
  font_awesome_flutter: ^10.10.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.0

  # Navigation & Routing
  flutter_snake_navigationbar: ^0.6.1

  # State Management
  provider: ^6.1.5

  # HTTP and API
  http: ^1.3.0
  odoo_rpc: ^0.7.1

  # Local Storage & Preferences
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_cache_manager: ^3.4.1

  # Forms and Validation
  flutter_typeahead: ^5.2.0

  # PDF Generation and Printing
  pdf: ^3.11.3
  printing: ^5.14.2

  # Files and Media
  file_picker: ^10.3.1
  image_picker: ^1.1.2
  video_player: ^2.8.2
  cached_network_image: ^3.4.1
  open_file: ^3.5.10
  signature: ^5.4.0

  # Loading and Progress
  shimmer: ^3.0.0
  loading_animation_widget: ^1.3.0
  confetti: ^0.8.0
  dots_indicator: ^3.0.0

  # Charts and Maps (Using fl_chart as standard)
  fl_chart: ^1.1.1
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Utils and Plugins
  connectivity_plus: ^6.1.4
  share_plus: ^11.0.0
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  geolocator: ^11.0.0
  package_info_plus: ^8.1.1
  speech_to_text: ^7.2.0

  # Barcode and QR Code
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.2

  # Authentication
  local_auth: ^2.3.0

  # AI and OCR
  google_mlkit_text_recognition: ^0.15.0

  # Other Widgets
  carousel_slider: ^5.0.0
  flutter_speed_dial: ^7.0.0
  flutter_inappwebview: ^6.1.5
  in_app_review: ^2.0.9
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/lotti/
    - assets/splash/splash_video.mp4

  fonts:
    - family: YaroRg
      fonts:
        - asset: assets/fonts/YaroRg-Bold.ttf
          weight: 700
